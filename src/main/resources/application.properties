# Local server port
server.port=8080

# No context-path: let Spring Boot/Tomcat decide
# server.servlet.context-path=

# Swagger docs
springdoc.api-docs.path=/api-docs

# PostgreSQL DB
spring.datasource.url=jdbc:postgresql://103.133.215.182:5432/Procurement
spring.datasource.username=mmudevdb
spring.datasource.password=mmudevdb
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=my_super_secret_key_which_should_be_very_long_1234567890
jwt.expiration=28800000

# CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.exposed-headers=Authorization